[project]
name = signal_light_demo
version = 0.1.0
created = 2026-06-15T09:22:14.613Z
type = tuyaopen-app
; INI format version — do not edit
schema = 1

[platform]
; valid targets: t5 | esp32 | linux | raspberrypi
target = t5
sdk = tuyaopen
sdk_version = main

[build]
output = build/
toolchain = default

[features]
description = 在 **TUYA T5AI CORE** 开发板上，做一个桌面「AI 编程助手」：

- **语音听写**：长按说话 → 云端 ASR → 文字经 UART 注入 PC 当前输入框（无需切换窗口打字）
- **状态灯**：红 / 黄 / 绿 LED 经 UART 与 PC 上 **Claude Code / Codex** 联动，抬头即可知 Agent 在干什么
- **状态屏（可选）**：128×64 SSD1306 OLED 显示 Wi-Fi、聆听中、Claude 状态等

[board]
id = tuya-t5ai-core
kconfig_id = TUYA_T5AI_CORE
config_file = config/TUYA_T5AI_CORE.config
